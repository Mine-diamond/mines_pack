# 由 trigger_core 写入

modules:
  - dir: dialog
    triggers:
      - name: mqp.dialog.game_rule
        display: "游戏规则设置面板"
        actions:
          - mica_quick_panel:dialog/gamerule_dialog/open_gamerule_dialog
      - name: mqp.dialog.game_rule.random_tick_speed
        display: "随机刻速度设置面板"
        actions:
          - mica_quick_panel:dialog/gamerule_dialog/open_random_tick_dialog
      - name: mqp.dialog.simple_feature
        display: "功能设置面板"
        actions:
          - mica_quick_panel:dialog/simple_feature_dialog/open_simple_feature_dialog
      - name: mqp.dialog.time_setting
        display: "时间设置面板"
        actions:
          - mica_quick_panel:dialog/time_setting_dialog/open_time_setting_dialog
      - name: mqp.dialog.moon_phase
        display: "设置月相"
        actions:
          - mica_quick_panel:dialog/time_setting_dialog/open_moon_phase_setting_dialog
      - name: mqp.dialog.highlight
        display: "高亮设置面板"
        actions:
          - mica_quick_panel:dialog/highlight_dialog/open_highlight_dialog
      - name: mqp.dialog.kill_all_mob
        display: "清理实体确认面板"
        actions:
          - mica_quick_panel:dialog/kill_all_mob_dialog/open_kill_all_mob_dialog
      - name: mqp.dialog.block_interaction_setting
        display: "方块交互距离设置面板"
        actions:
          - mica_quick_panel:dialog/interaction_setting_dialog/open_block_interaction_setting_dialog
      - name: mqp.dialog.entity_interaction_setting
        display: "实体交互距离设置面板"
        actions:
          - mica_quick_panel:dialog/interaction_setting_dialog/open_entity_interaction_setting_dialog
      - name: mqp.dialog.rename_name_tag_common
        display: "重命名命名牌常规面板"
        actions:
          - mica_quick_panel:dialog/raname_name_tag/open_rename_name_tag_common_dialog
      - name: mqp.dialog.rename_name_tag_json
        display: "重命名命名牌json面板"
        actions:
          - mica_quick_panel:dialog/raname_name_tag/open_rename_name_tag_json_dialog
  - dir: game_rule
    triggers:
      - name: mqp.game_rule.change
        display: "修改游戏规则"
        mapping_actions:
          1: mica_quick_panel:game_rule_change/switch_advance_time
          2: mica_quick_panel:game_rule_change/switch_advance_weather
          3: mica_quick_panel:game_rule_change/switch_spawn_mobs
          4: mica_quick_panel:game_rule_change/switch_keep_inventory
          5: mica_quick_panel:game_rule_change/switch_command_block_output
          6: mica_quick_panel:game_rule_change/switch_mob_drops
          7: mica_quick_panel:game_rule_change/switch_block_drops
          8: mica_quick_panel:game_rule_change/switch_show_advancement_messages
        actions:
          - mica_quick_panel:dialog/gamerule_dialog/open_gamerule_dialog
      - name: mqp.game_rule.set_to_preferred
        display: "设置为首选状态"
        actions:
          - mica_quick_panel:game_rule_change/set_game_rule_to_preferred_state
          - mica_quick_panel:dialog/gamerule_dialog/open_gamerule_dialog
      - name: mqp.game_rule.set_random_tick_speed
        display: "设置随机刻速度"
        init: -1
        range: "0.."
        reset: -1
        actions:
          - mica_quick_panel:game_rule_change/set_random_tick_speed_init
          - mica_quick_panel:dialog/gamerule_dialog/open_gamerule_dialog
  - dir: simple_feature
    triggers:
      - name: mqp.simple_feature.night_version
        display: "修改夜视效果"
        actions:
          - mica_quick_panel:simple_feature/night_version/switch_night_version
          - mica_quick_panel:dialog/simple_feature_dialog/open_simple_feature_dialog
      - name: mqp.trigger.simple_feature.invulnerable_mode
        display: "修改无敌模式"
        actions:
          - mica_quick_panel:simple_feature/invulnerable_mode/switch_invulnerable_mode
          - mica_quick_panel:dialog/simple_feature_dialog/open_simple_feature_dialog
      - name: mqp.trigger.simple_feature.run_mode
        display: "切换赶路模式"
        actions:
          - mica_quick_panel:simple_feature/run_mode/switch_run_mode
          - mica_quick_panel:dialog/simple_feature_dialog/open_simple_feature_dialog
  - dir: time_setting
    triggers:
      - name: mqp.trigger.time_setting
        display: "设置时间"
        init: -1
        range: "0.."
        reset: -1
        actions:
          - mica_quick_panel:time_setting/set_time_init
          - mica_quick_panel:dialog/time_setting_dialog/open_time_setting_dialog
      - name: mqp.trigger.moon_phase
        display: "设置月相"
        init: -1
        range: "0.."
        reset: -1
        actions:
          - mica_quick_panel:time_setting/set_moon_phase
          - mica_quick_panel:dialog/time_setting_dialog/open_moon_phase_setting_dialog
  - dir: highlight
    triggers:
      - name: mqp.trigger.highlight.entity_enabled_flags
        display: "切换实体高亮"
        actions:
          - mica_quick_panel:highlight/switch_entity_highlight
          - mica_quick_panel:dialog/highlight_dialog/open_highlight_dialog
      - name: mqp.trigger.highlight.player_enabled_flags
        display: "切换玩家高亮"
        actions:
          - mica_quick_panel:highlight/switch_player_highlight
          - mica_quick_panel:dialog/highlight_dialog/open_highlight_dialog
      - name: mqp.trigger.highlight.item_enabled_flags
        display: "切换物品高亮"
        actions:
          - mica_quick_panel:highlight/switch_item_highlight
          - mica_quick_panel:dialog/highlight_dialog/open_highlight_dialog
  - dir: kill_all_mob
    triggers:
      - name: mqp.trigger.kill_all_mob.close_mob_loot
        display: "切换击杀生物是否掉落物品"
        actions:
          - mica_quick_panel:kill_all_mob/switch_gen_drops
          - mica_quick_panel:dialog/kill_all_mob_dialog/open_kill_all_mob_dialog
      - name: mqp.trigger.kill_all_mob.kill_type
        display: "切换清除类型"
        actions:
          - mica_quick_panel:kill_all_mob/switch_kill_type
          - mica_quick_panel:dialog/kill_all_mob_dialog/open_kill_all_mob_dialog
      - name: mqp.trigger.kill_all_mob.kill_all_mob
        display: "清除生物"
        actions:
          - mica_quick_panel:kill_all_mob/kill_all_mob
          - mica_quick_panel:dialog/kill_all_mob_dialog/open_kill_all_mob_dialog
  - dir: interaction_setting
    triggers:
      - name: mqp.trigger.interaction_setting.block_switch_force_mode
        display: "切换方块交互距离强制模式"
        actions:
          - mica_quick_panel:interaction_setting/block_interaction_distance_setting/switch_force_mode
          - mica_quick_panel:dialog/interaction_setting_dialog/open_block_interaction_setting_dialog
      - name: mqp.trigger.interaction_setting.entity_switch_force_mode
        display: "切换实体交互距离强制模式"
        actions:
          - mica_quick_panel:interaction_setting/entity_interaction_distance_setting/switch_force_mode
          - mica_quick_panel:dialog/interaction_setting_dialog/open_entity_interaction_setting_dialog
  - dir: easter_egg
    triggers:
      - name: mqp.trigger.easter_egg.count
        display: "egg"
        actions:
          - mica_quick_panel:easter_egg/add_click_count
  - dir: take_entity
    triggers:
      - name: mqp.trigger.take_entity.take_entity
        display: "带走生物"
        init: -1
        range: "0.."
        reset: -1
        actions:
          - mica_quick_panel:take_entity/execute
  - dir: item
    triggers:
      - name: mqp.trigger.item.entity_compression_staff.get
        display: "获取生物压缩之杖"
        actions:
          - mica_quick_panel:item/entity_compression_staff/give_prepare
      - name: mqp.trigger.item.advanced_name_tag.get
        display: "获取高级命名牌"
        actions:
          - mica_quick_panel:item/advanced_name_tag/give
  - dir: util
    triggers:
      - name: mqp.trigger.util.close_dialog
        display: "关闭dialog"
        actions:
          - mica_quick_panel:util/dialog/close_dialog
